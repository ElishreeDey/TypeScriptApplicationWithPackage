<!DOCTYPE html>
<html lang="en">
<head>
    <title>Assignment TS</title>
    <script type="module" src="../dist/Scripts/index.js"></script>
    <link rel="stylesheet" href="./Styles/detailPages.css">
</head>

<body>
<div class="pageContainer">
<!-- FORM Entry -->
<div id="divFormComponent">
    <h1>Registration</h1>
    <form id="registrationForm">
        <label for="userName">
            First name:
            <span id="mandatoryName" class="mandatory">*</span>
        </label><br>
        <input type="text" id="userName" required onchange="checkNotIsEmpty(this.value)"><br>
        <label for="email">
            Email:
            <span id="mandatoryEmail" class="mandatory">*</span>
        </label><br>
        <input type="email" id="email" required onchange="validateEmail(this.value)"><br>
        <label for="phone">
            Phone:
            <span id="mandatoryPhone" class="mandatory">*</span>
        </label><br>
        <input type="text" id="phone" required onchange="validateFlexiblePhone(this.value)"><br>
        <label for="gender">Gender:</label><br>
        <select id="gender">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <br><br>
        <button id="btnAddData" type="button" onclick="saveData()">Submit</button>
        <button id="btnEditData" type="button" onclick="saveEditedData()" class="invisible">
            Save Changes
        </button>
    </form>
</div>

<!-- TABLE To display Registed data -->
<div id="divTableComponent">
    <h1>View Registered Data</h1><br>
    <table id="viewData" class="displayRegisteredData">
        <thead>
            <tr>
                <th class="storedDataColHeader">Name</th>
                <th class="storedDataColHeader">Email</th>
                <th class="storedDataColHeader">Phone</th>
                <th class="storedDataColHeader">Gender</th>
                <th class="storedDataColHeader" colspan="2">Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <span id="editTableRowNo" class="invisible"></span>
</div>

<!-- SNACKBAR - To display Some text some message -->
<div id="snackbar"></div>
</div>
</body>

</html>
