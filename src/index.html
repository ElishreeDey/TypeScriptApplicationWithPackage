<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Assignment TS</title>
        <script type="module" src="../dist/Scripts/index.js"></script>
        <link rel="stylesheet" href="./Styles/detailPages.css">
    </head>
    <body> 
        <table class="NoBorder">
            <tr>
                <!-- Start: To enter data for registration -->
                <td class="NoBorder">
                    <h1>Registration</h1><br>
                    <div id="registrationForm">
                        <label for="fname"><span>First name: </span><span id="mandatoryName" class="mandatory">*</span> </label><br>
                        <input type="text" id="userName" required onchange="checkNotIsEmpty(this.value)"> <br>
                        <label for="email"><span>Email: <span><span id="mandatoryEmail" class="mandatory">*</span></label><br>
                        <input type="email" id="email" required onchange="validateEmail(this.value)"><br>
                        <label for="phone"><span>Phone: </span><span id="mandatoryPhone" class="mandatory">*</span></label><br>
                        <input type="text" id="phone" required onchange="validateFlexiblePhone(this.value)"><br>
                        <label for="gender">Gender:</label><br>
                        <select id="gender">  
                            <option id="" value="">Select Gender</option>  
                            <option id="maleOption" value="male">male</option>
                            <option id="femaleOption" value="female">female</option>
                        </select>
                        <br>
                        <button id="btnAddData" onclick="saveData()">Submit</button>
                        <button id="btnEditData" onclick="saveEditedData()" class="invisible">Save Changes</button>
                    </div>
                </td>
                <!-- End: To enter data for registration -->

                <!-- Start: To view entered data -->
                <td id="viewDataTD" class="displayRegisteredData">
                    <table id="viewData">                        
                        <h1>View Registered Data </h1><br>
                        <tr>
                            <td class="storedDataColHeader">Name</td>
                            <td class="storedDataColHeader">Email</td>
                            <td class="storedDataColHeader">Phone</td>
                            <td class="storedDataColHeader">Gender</td>
                            <td class="storedDataColHeader" colspan="2">Action</td>
                        </tr>
                    </table>
                    <span id="editTableRowNo" class="invisible"></span>
                </td>
                <!-- End: To view entered data -->

                <div id="snackbar">Some text some message..</div>
            </tr>
        </table>
    </body>
</html>
